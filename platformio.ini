; PlatformIO 프로젝트 설정 — ESP32-C3 Super Mini
; 빌드:   pio run
; 업로드: pio run -t upload
; 모니터: pio device monitor

[platformio]
default_envs = esp32c3-super-mini

[env:esp32c3-super-mini]
platform  = espressif32
board     = esp32-c3-devkitm-1   ; C3 Super Mini는 devkitm-1 정의와 호환
framework = arduino

; ESP32-C3 Super Mini는 네이티브 USB(USB-CDC)를 사용한다.
; 시리얼 모니터를 USB로 받으려면 아래 플래그가 필요하다.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed  = 115200
upload_speed   = 921600

; 라이브러리: NimBLE(경량 BLE 스택) + ESP32Servo
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.2
    madhephaestus/ESP32Servo @ ^3.0.6
